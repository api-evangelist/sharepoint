specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Microsoft SharePoint
providerId: sharepoint
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - SharePoint
  - Microsoft 365
  - Microsoft Graph
  - Rate Limiting
description: SharePoint Online enforces multi-layered throttling across user, tenant, application, and
  per-site scopes. Limits are expressed in Resource Units (RUs) for Microsoft Graph (1 RU per single-item
  query, 2 RUs per multi-item or write, 5 RUs for permission operations); CSOM and REST do not have a
  fixed RU cost but are subject to additional internal limits. On throttling, SharePoint returns 429
  or 503 with a Retry-After header. Optional preview RateLimit headers (RateLimit-Limit / -Remaining
  / -Reset) are returned when an app reaches >=80% of its 1-minute resource-unit budget.
sources:
  - https://learn.microsoft.com/en-us/sharepoint/dev/general-development/how-to-avoid-getting-throttled-or-blocked-in-sharepoint-online
headers:
  retryAfter: Retry-After
  limit: RateLimit-Limit
  remaining: RateLimit-Remaining
  reset: RateLimit-Reset
responseCodes:
  throttled: 429
  serviceUnavailable: 503
