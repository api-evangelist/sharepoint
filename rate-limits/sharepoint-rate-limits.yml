policies:
  - name: Resource-unit cost model
    description: Microsoft Graph requests are priced in Resource Units (1 = single item / delta with
      token / file download, 2 = multi-item / write, 5 = permission operations). CSOM and REST have no
      fixed RU cost and are typically more expensive per request — prefer Microsoft Graph.
  - name: Honor Retry-After
    description: On 429 or 503, honor the Retry-After header. Throttled requests still count toward usage
      limits, so aggressive retry loops worsen throttling.
  - name: RateLimit headers (preview)
    description: At >=80% of the app 1-minute resource-unit limit, SharePoint returns RateLimit-Limit,
      RateLimit-Remaining, and RateLimit-Reset (IETF draft-03). Use them to throttle pre-emptively.
  - name: Decorate traffic
    description: Send User-Agent in the form ISV|CompanyName|AppName/Version (or NONISV|... for enterprise
      apps) and register an Entra (Azure AD) AppID to receive priority over undecorated traffic.
  - name: Multi-Geo
    description: Each geo has its own usage measurement; license-bound limits use the total tenant license
      count across all geos.
  - name: Peak vs off-peak
    description: Throttling is more aggressive during regional peak hours; bulk scanning workloads should
      run during off-peak windows where possible.
  - name: Block escalation
    description: Sustained excessive traffic can result in the app or tenant being blocked (continuous
      503); Microsoft notifies the customer via Office 365 Message Center and requires remediation before
      lifting the block.
