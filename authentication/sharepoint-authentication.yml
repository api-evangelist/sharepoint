notes: >-
  Both the SharePoint REST API and Microsoft Graph authenticate with OAuth 2.0 through
  Microsoft Entra (Azure AD / Microsoft identity platform). Supports authorization code
  (delegated), client credentials (app-only), and on-behalf-of flows. Tokens are bearer
  tokens issued by login.microsoftonline.com. Write operations against the SharePoint REST
  service additionally require the X-RequestDigest form-digest header.
