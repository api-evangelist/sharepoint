naftiko: "1.0.0-alpha1"

info:
  label: "SharePoint Files and Search"
  description: "Shared capability for SharePoint file management and search operations."
  tags:
    - SharePoint
    - Files
    - Documents
    - Search
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      SHAREPOINT_ACCESS_TOKEN: SHAREPOINT_ACCESS_TOKEN

capability:
  consumes:
    - type: http
      namespace: sp-files-search
      baseUri: https://{site_url}/_api
      description: "SharePoint REST API for files and search."
      authentication:
        type: bearer
        token: "{{SHAREPOINT_ACCESS_TOKEN}}"
      resources:
        - name: files
          path: /web
          description: "File and folder operations."
          operations:
            - name: get-files-in-folder
              method: GET
              path: /web/getfolderbyserverrelativeurl('{folder_url}')/files
              description: "Get files in a folder."
              inputParameters:
                - name: folder_url
                  in: path
                  type: string
                  required: true
                  description: "Server-relative folder URL."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: upload-file
              method: POST
              path: /web/getfolderbyserverrelativeurl('{folder_url}')/files/add(url='{file_name}',overwrite=true)
              description: "Upload a file."
              inputParameters:
                - name: folder_url
                  in: path
                  type: string
                  required: true
                - name: file_name
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: download-file
              method: GET
              path: /web/getfilebyserverrelativeurl('{file_url}')/$value
              description: "Download file content."
              inputParameters:
                - name: file_url
                  in: path
                  type: string
                  required: true
              outputRawFormat: binary
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: search
          path: /search
          description: "Search operations."
          operations:
            - name: search-query
              method: GET
              path: /search/query
              description: "Execute a search query."
              inputParameters:
                - name: querytext
                  in: query
                  type: string
                  required: true
                  description: "Search query text."
                - name: rowlimit
                  in: query
                  type: integer
                  required: false
                  description: "Max results."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: user-profiles
          path: /SP.UserProfiles.PeopleManager
          description: "User profile operations."
          operations:
            - name: get-my-user-profile
              method: GET
              path: /SP.UserProfiles.PeopleManager/GetMyProperties
              description: "Get current user profile."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8101
      namespace: sp-files-search-rest
      resources:
        - path: /v1/files
          name: files
          operations:
            - method: GET
              name: get-files-in-folder
              call: "sp-files-search.get-files-in-folder"
              with:
                folder_url: "rest.folder_url"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/search
          name: search
          operations:
            - method: GET
              name: search-query
              call: "sp-files-search.search-query"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/user-profiles/me
          name: user-profiles
          operations:
            - method: GET
              name: get-my-user-profile
              call: "sp-files-search.get-my-user-profile"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: sp-files-search-mcp
      transport: http
      tools:
        - name: get-files-in-folder
          description: "List files in a SharePoint folder"
          hints: {readOnly: true, idempotent: true}
          call: "sp-files-search.get-files-in-folder"
          with:
            folder_url: "tools.folder_url"
          outputParameters:
            - type: object
              mapping: "$."
        - name: upload-file
          description: "Upload a file to SharePoint"
          hints: {readOnly: false, idempotent: false}
          call: "sp-files-search.upload-file"
          with:
            folder_url: "tools.folder_url"
            file_name: "tools.file_name"
          outputParameters:
            - type: object
              mapping: "$."
        - name: download-file
          description: "Download a file from SharePoint"
          hints: {readOnly: true, idempotent: true}
          call: "sp-files-search.download-file"
          with:
            file_url: "tools.file_url"
          outputParameters:
            - type: object
              mapping: "$."
        - name: search-query
          description: "Search across SharePoint content"
          hints: {readOnly: true, idempotent: true}
          call: "sp-files-search.search-query"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-my-user-profile
          description: "Get current user's SharePoint profile"
          hints: {readOnly: true, idempotent: true}
          call: "sp-files-search.get-my-user-profile"
          outputParameters:
            - type: object
              mapping: "$."
