naftiko: "1.0.0-alpha1"

info:
  label: "SharePoint Sites and Lists"
  description: "Shared capability for SharePoint site, list, and list item management operations."
  tags:
    - SharePoint
    - Sites
    - Lists
    - Items
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      SHAREPOINT_ACCESS_TOKEN: SHAREPOINT_ACCESS_TOKEN

capability:
  consumes:
    - type: http
      namespace: sp-sites-lists
      baseUri: https://{site_url}/_api
      description: "SharePoint REST API for sites, lists, and items."
      authentication:
        type: bearer
        token: "{{SHAREPOINT_ACCESS_TOKEN}}"
      resources:
        - name: sites
          path: /web
          description: "SharePoint site operations."
          operations:
            - name: get-web
              method: GET
              path: /web
              description: "Retrieve site properties."
              inputParameters:
                - name: $select
                  in: query
                  type: string
                  required: false
                  description: "Properties to return."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-web-title
              method: GET
              path: /web/title
              description: "Retrieve site title."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: lists
          path: /web/lists
          description: "SharePoint list and library operations."
          operations:
            - name: get-lists
              method: GET
              path: /web/lists
              description: "Retrieve all lists on the site."
              inputParameters:
                - name: $select
                  in: query
                  type: string
                  required: false
                  description: "Properties to return."
                - name: $filter
                  in: query
                  type: string
                  required: false
                  description: "OData filter expression."
                - name: $top
                  in: query
                  type: integer
                  required: false
                  description: "Maximum results."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-list
              method: POST
              path: /web/lists
              description: "Create a new list."
              body:
                type: json
                data:
                  Title: "{{tools.title}}"
                  BaseTemplate: "{{tools.base_template}}"
                  Description: "{{tools.description}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-list-by-title
              method: GET
              path: /web/lists/getbytitle('{list_title}')
              description: "Retrieve a list by title."
              inputParameters:
                - name: list_title
                  in: path
                  type: string
                  required: true
                  description: "List title."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: items
          path: /web/lists
          description: "List item operations."
          operations:
            - name: get-list-items
              method: GET
              path: /web/lists/getbytitle('{list_title}')/items
              description: "Retrieve items from a list."
              inputParameters:
                - name: list_title
                  in: path
                  type: string
                  required: true
                  description: "List title."
                - name: $select
                  in: query
                  type: string
                  required: false
                - name: $filter
                  in: query
                  type: string
                  required: false
                - name: $top
                  in: query
                  type: integer
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-list-item
              method: POST
              path: /web/lists/getbytitle('{list_title}')/items
              description: "Add an item to a list."
              inputParameters:
                - name: list_title
                  in: path
                  type: string
                  required: true
              body:
                type: json
                data:
                  Title: "{{tools.title}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-list-item-by-id
              method: GET
              path: /web/lists/getbytitle('{list_title}')/items({item_id})
              description: "Retrieve a list item by ID."
              inputParameters:
                - name: list_title
                  in: path
                  type: string
                  required: true
                - name: item_id
                  in: path
                  type: integer
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-list-item
              method: POST
              path: /web/lists/getbytitle('{list_title}')/items({item_id})
              description: "Update a list item."
              inputParameters:
                - name: list_title
                  in: path
                  type: string
                  required: true
                - name: item_id
                  in: path
                  type: integer
                  required: true
              body:
                type: json
                data:
                  Title: "{{tools.title}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-list-item
              method: DELETE
              path: /web/lists/getbytitle('{list_title}')/items({item_id})
              description: "Delete a list item."
              inputParameters:
                - name: list_title
                  in: path
                  type: string
                  required: true
                - name: item_id
                  in: path
                  type: integer
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: sp-sites-lists-rest
      resources:
        - path: /v1/sites
          name: sites
          operations:
            - method: GET
              name: get-web
              call: "sp-sites-lists.get-web"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/lists
          name: lists
          operations:
            - method: GET
              name: get-lists
              call: "sp-sites-lists.get-lists"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-list
              call: "sp-sites-lists.create-list"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/lists/{title}/items
          name: items
          operations:
            - method: GET
              name: get-list-items
              call: "sp-sites-lists.get-list-items"
              with:
                list_title: "rest.title"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-list-item
              call: "sp-sites-lists.create-list-item"
              with:
                list_title: "rest.title"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: sp-sites-lists-mcp
      transport: http
      tools:
        - name: get-web
          description: "Get SharePoint site properties"
          hints: {readOnly: true, idempotent: true}
          call: "sp-sites-lists.get-web"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-lists
          description: "List all SharePoint lists on a site"
          hints: {readOnly: true, idempotent: true}
          call: "sp-sites-lists.get-lists"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-list
          description: "Create a new SharePoint list"
          hints: {readOnly: false, idempotent: false}
          call: "sp-sites-lists.create-list"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-list-by-title
          description: "Get a SharePoint list by title"
          hints: {readOnly: true, idempotent: true}
          call: "sp-sites-lists.get-list-by-title"
          with:
            list_title: "tools.list_title"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-list-items
          description: "Get items from a SharePoint list"
          hints: {readOnly: true, idempotent: true}
          call: "sp-sites-lists.get-list-items"
          with:
            list_title: "tools.list_title"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-list-item
          description: "Add an item to a SharePoint list"
          hints: {readOnly: false, idempotent: false}
          call: "sp-sites-lists.create-list-item"
          with:
            list_title: "tools.list_title"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-list-item-by-id
          description: "Get a specific list item by ID"
          hints: {readOnly: true, idempotent: true}
          call: "sp-sites-lists.get-list-item-by-id"
          with:
            list_title: "tools.list_title"
            item_id: "tools.item_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: update-list-item
          description: "Update a SharePoint list item"
          hints: {readOnly: false, idempotent: true}
          call: "sp-sites-lists.update-list-item"
          with:
            list_title: "tools.list_title"
            item_id: "tools.item_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-list-item
          description: "Delete a SharePoint list item"
          hints: {readOnly: false, destructive: true, idempotent: true}
          call: "sp-sites-lists.delete-list-item"
          with:
            list_title: "tools.list_title"
            item_id: "tools.item_id"
          outputParameters:
            - type: object
              mapping: "$."
