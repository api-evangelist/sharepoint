naftiko: 1.0.0-alpha2
info:
  label: SharePoint Content Management
  description: Unified workflow for managing SharePoint content including sites, lists, items, files, and search. Used by
    content managers, site admins, and collaboration teams.
  tags:
  - SharePoint
  - Content Management
  - Collaboration
  - Document Management
  created: '2026-04-18'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    SHAREPOINT_ACCESS_TOKEN: SHAREPOINT_ACCESS_TOKEN
capability:
  consumes:
  - type: http
    namespace: sp-sites-lists
    baseUri: https://{site_url}/_api
    description: SharePoint REST API for sites, lists, and items.
    authentication:
      type: bearer
      token: '{{SHAREPOINT_ACCESS_TOKEN}}'
    resources:
    - name: sites
      path: /web
      description: SharePoint site operations.
      operations:
      - name: get-web
        method: GET
        path: /web
        description: Retrieve site properties.
        inputParameters:
        - name: $select
          in: query
          type: string
          required: false
          description: Properties to return.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-web-title
        method: GET
        path: /web/title
        description: Retrieve site title.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: lists
      path: /web/lists
      description: SharePoint list and library operations.
      operations:
      - name: get-lists
        method: GET
        path: /web/lists
        description: Retrieve all lists on the site.
        inputParameters:
        - name: $select
          in: query
          type: string
          required: false
          description: Properties to return.
        - name: $filter
          in: query
          type: string
          required: false
          description: OData filter expression.
        - name: $top
          in: query
          type: integer
          required: false
          description: Maximum results.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-list
        method: POST
        path: /web/lists
        description: Create a new list.
        body:
          type: json
          data:
            Title: '{{tools.title}}'
            BaseTemplate: '{{tools.base_template}}'
            Description: '{{tools.description}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-list-by-title
        method: GET
        path: /web/lists/getbytitle('{list_title}')
        description: Retrieve a list by title.
        inputParameters:
        - name: list_title
          in: path
          type: string
          required: true
          description: List title.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: items
      path: /web/lists
      description: List item operations.
      operations:
      - name: get-list-items
        method: GET
        path: /web/lists/getbytitle('{list_title}')/items
        description: Retrieve items from a list.
        inputParameters:
        - name: list_title
          in: path
          type: string
          required: true
          description: List title.
        - name: $select
          in: query
          type: string
          required: false
        - name: $filter
          in: query
          type: string
          required: false
        - name: $top
          in: query
          type: integer
          required: false
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-list-item
        method: POST
        path: /web/lists/getbytitle('{list_title}')/items
        description: Add an item to a list.
        inputParameters:
        - name: list_title
          in: path
          type: string
          required: true
        body:
          type: json
          data:
            Title: '{{tools.title}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-list-item-by-id
        method: GET
        path: /web/lists/getbytitle('{list_title}')/items({item_id})
        description: Retrieve a list item by ID.
        inputParameters:
        - name: list_title
          in: path
          type: string
          required: true
        - name: item_id
          in: path
          type: integer
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: update-list-item
        method: POST
        path: /web/lists/getbytitle('{list_title}')/items({item_id})
        description: Update a list item.
        inputParameters:
        - name: list_title
          in: path
          type: string
          required: true
        - name: item_id
          in: path
          type: integer
          required: true
        body:
          type: json
          data:
            Title: '{{tools.title}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: delete-list-item
        method: DELETE
        path: /web/lists/getbytitle('{list_title}')/items({item_id})
        description: Delete a list item.
        inputParameters:
        - name: list_title
          in: path
          type: string
          required: true
        - name: item_id
          in: path
          type: integer
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: sp-files-search
    baseUri: https://{site_url}/_api
    description: SharePoint REST API for files and search.
    authentication:
      type: bearer
      token: '{{SHAREPOINT_ACCESS_TOKEN}}'
    resources:
    - name: files
      path: /web
      description: File and folder operations.
      operations:
      - name: get-files-in-folder
        method: GET
        path: /web/getfolderbyserverrelativeurl('{folder_url}')/files
        description: Get files in a folder.
        inputParameters:
        - name: folder_url
          in: path
          type: string
          required: true
          description: Server-relative folder URL.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: upload-file
        method: POST
        path: /web/getfolderbyserverrelativeurl('{folder_url}')/files/add(url='{file_name}',overwrite=true)
        description: Upload a file.
        inputParameters:
        - name: folder_url
          in: path
          type: string
          required: true
        - name: file_name
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: download-file
        method: GET
        path: /web/getfilebyserverrelativeurl('{file_url}')/$value
        description: Download file content.
        inputParameters:
        - name: file_url
          in: path
          type: string
          required: true
        outputRawFormat: binary
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: search
      path: /search
      description: Search operations.
      operations:
      - name: search-query
        method: GET
        path: /search/query
        description: Execute a search query.
        inputParameters:
        - name: querytext
          in: query
          type: string
          required: true
          description: Search query text.
        - name: rowlimit
          in: query
          type: integer
          required: false
          description: Max results.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: user-profiles
      path: /SP.UserProfiles.PeopleManager
      description: User profile operations.
      operations:
      - name: get-my-user-profile
        method: GET
        path: /SP.UserProfiles.PeopleManager/GetMyProperties
        description: Get current user profile.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: sp-content-api
    description: Unified REST API for SharePoint content management.
    resources:
    - path: /v1/sites
      name: sites
      operations:
      - method: GET
        name: get-web
        call: sp-sites-lists.get-web
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/lists
      name: lists
      operations:
      - method: GET
        name: get-lists
        call: sp-sites-lists.get-lists
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-list
        call: sp-sites-lists.create-list
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/lists/{title}/items
      name: items
      operations:
      - method: GET
        name: get-list-items
        call: sp-sites-lists.get-list-items
        with:
          list_title: rest.title
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-list-item
        call: sp-sites-lists.create-list-item
        with:
          list_title: rest.title
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/files
      name: files
      operations:
      - method: GET
        name: get-files
        call: sp-files-search.get-files-in-folder
        with:
          folder_url: rest.folder_url
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/search
      name: search
      operations:
      - method: GET
        name: search
        call: sp-files-search.search-query
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9080
    namespace: sp-content-mcp
    transport: http
    description: MCP server for AI-assisted SharePoint content management.
    tools:
    - name: get-web
      description: Get SharePoint site properties
      hints:
        readOnly: true
        idempotent: true
      call: sp-sites-lists.get-web
      outputParameters:
      - type: object
        mapping: $.
    - name: get-lists
      description: List all SharePoint lists
      hints:
        readOnly: true
        idempotent: true
      call: sp-sites-lists.get-lists
      outputParameters:
      - type: object
        mapping: $.
    - name: create-list
      description: Create a new SharePoint list
      hints:
        readOnly: false
        idempotent: false
      call: sp-sites-lists.create-list
      outputParameters:
      - type: object
        mapping: $.
    - name: get-list-items
      description: Get items from a SharePoint list
      hints:
        readOnly: true
        idempotent: true
      call: sp-sites-lists.get-list-items
      with:
        list_title: tools.list_title
      outputParameters:
      - type: object
        mapping: $.
    - name: create-list-item
      description: Add an item to a SharePoint list
      hints:
        readOnly: false
        idempotent: false
      call: sp-sites-lists.create-list-item
      with:
        list_title: tools.list_title
      outputParameters:
      - type: object
        mapping: $.
    - name: update-list-item
      description: Update a SharePoint list item
      hints:
        readOnly: false
        idempotent: true
      call: sp-sites-lists.update-list-item
      with:
        list_title: tools.list_title
        item_id: tools.item_id
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-list-item
      description: Delete a SharePoint list item
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: sp-sites-lists.delete-list-item
      with:
        list_title: tools.list_title
        item_id: tools.item_id
      outputParameters:
      - type: object
        mapping: $.
    - name: get-files-in-folder
      description: List files in a SharePoint folder
      hints:
        readOnly: true
        idempotent: true
      call: sp-files-search.get-files-in-folder
      with:
        folder_url: tools.folder_url
      outputParameters:
      - type: object
        mapping: $.
    - name: upload-file
      description: Upload a file to SharePoint
      hints:
        readOnly: false
        idempotent: false
      call: sp-files-search.upload-file
      with:
        folder_url: tools.folder_url
        file_name: tools.file_name
      outputParameters:
      - type: object
        mapping: $.
    - name: download-file
      description: Download a file from SharePoint
      hints:
        readOnly: true
        idempotent: true
      call: sp-files-search.download-file
      with:
        file_url: tools.file_url
      outputParameters:
      - type: object
        mapping: $.
    - name: search-query
      description: Search across all SharePoint content
      hints:
        readOnly: true
        idempotent: true
      call: sp-files-search.search-query
      outputParameters:
      - type: object
        mapping: $.
    - name: get-my-user-profile
      description: Get current user's SharePoint profile
      hints:
        readOnly: true
        idempotent: true
      call: sp-files-search.get-my-user-profile
      outputParameters:
      - type: object
        mapping: $.
