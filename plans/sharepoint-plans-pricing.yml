specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Microsoft SharePoint
providerId: sharepoint
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - SharePoint
  - Microsoft 365
  - Collaboration
  - Document Management
  - Cloud Storage
description: SharePoint Online is licensed per-user as a standalone plan or bundled into Microsoft 365
  / Office 365 enterprise SKUs. Standalone "SharePoint (Plan 1)" is the entry-level commercial offering;
  larger organizations typically license SharePoint via Microsoft 365 Business Standard or Office 365
  E-tier plans where SharePoint is included as a workload. Per-user prices reflect annual commitment;
  monthly subscriptions carry a higher rate. Public sector and student/developer SKUs are not represented
  here.
sources:
  - https://www.microsoft.com/en-us/microsoft-365/sharepoint/compare-sharepoint-plans
plans:
  - id: sharepoint-plan-1
    name: SharePoint (Plan 1)
    type: subscription
    description: Standalone SharePoint Online subscription. Includes SharePoint, OneDrive, and Microsoft
      Lists with secure file share and real-time co-authoring.
    entries:
      - label: Subscription
        name: subscription
        type: subscription
        metric: seat
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: '$5.00 per user/month (annual)'
        userMultiplied: true
    elements:
      - name: SharePoint Online
      - name: OneDrive
      - name: Microsoft Lists
      - name: Real-time co-authoring
      - name: External sharing
  - id: sharepoint-m365-business-standard
    name: Microsoft 365 Business Standard
    type: subscription
    description: Mid-market bundle that includes SharePoint plus desktop Office apps, custom business
      email, Microsoft Teams, and 1 TB OneDrive storage per user.
    entries:
      - label: Subscription
        name: subscription
        type: subscription
        metric: seat
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: '$12.50 per user/month (annual)'
        userMultiplied: true
      - label: OneDrive Storage
        name: onedrive_storage
        type: quota
        metric: TB
        limit: 1
        geo: global
        unit: 1
        price: included
        userMultiplied: true
    elements:
      - name: SharePoint Online
      - name: OneDrive (1 TB / user)
      - name: Microsoft 365 Apps (desktop Office)
      - name: Microsoft Teams
      - name: Custom business email
      - name: Chat / Call / Meet
  - id: sharepoint-m365-business-standard-no-teams
    name: Microsoft 365 Business Standard (no Teams)
    type: subscription
    description: Same as Business Standard but with Microsoft Teams excluded (EU-driven SKU).
    entries:
      - label: Subscription
        name: subscription
        type: subscription
        metric: seat
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: '$9.29 per user/month (annual)'
        userMultiplied: true
    elements:
      - name: SharePoint Online
      - name: OneDrive (1 TB / user)
      - name: Microsoft 365 Apps (desktop Office)
      - name: Custom business email
      - name: Excludes Microsoft Teams
  - id: sharepoint-m365-copilot-addon
    name: Microsoft 365 Copilot (add-on)
    type: subscription
    description: Generative-AI add-on layered on top of an eligible Microsoft 365 plan; surfaces Copilot
      across Word, Excel, PowerPoint, Outlook, Teams, and SharePoint.
    entries:
      - label: Subscription
        name: subscription
        type: subscription
        metric: seat
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: '$30.00 per user/month (annual commitment)'
        userMultiplied: true
    elements:
      - name: Copilot in Word, Excel, PowerPoint, Outlook, Teams, SharePoint
      - name: Requires eligible Microsoft 365 base plan
  - id: sharepoint-enterprise
    name: Office 365 / Microsoft 365 Enterprise
    type: enterprise
    description: SharePoint is also included in Office 365 E1/E3/E5 and Microsoft 365 E3/E5 enterprise
      SKUs. Pricing for these tiers is published on the Microsoft 365 enterprise pricing page and via
      Microsoft volume licensing partners; treat as enterprise / contact sales for exact contract terms.
    entries:
      - label: Subscription
        name: subscription
        type: subscription
        metric: seat
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: see Microsoft 365 enterprise pricing
        userMultiplied: true
    elements:
      - name: SharePoint Online
      - name: OneDrive
      - name: Microsoft Teams
      - name: Office Apps
      - name: Advanced compliance / security (E5 tier)
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
